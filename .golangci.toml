version = '2'

[linters]
default = 'all'
disable = [
  'cyclop',
  'depguard',
  'dupl',
  'err113',          # Using errors.Is for sentinel errors is not always appropriate
  'exhaustive',
  'exhaustruct',     # Don't require all struct fields
  'funlen',
  'gocognit',
  'godoclint',
  'gomoddirectives',
  'gosec',
  'ireturn',
  'musttag',
  'nlreturn',
  'noctx',
  'nonamedreturns',  # Named returns are fine for multi-value returns
  'nestif',
  'predeclared',
  'recvcheck',
  'varnamelen',      # Short names are idiomatic in PDE/math code
  'wrapcheck',       # Wrapping external errors here adds noise without clear value
  'wsl',
]

[issues]
max-issues-per-linter = 0
max-same-issues = 0

[linters.settings.revive]
[[linters.settings.revive.rules]]
name = "var-naming"
disabled = true

[linters.settings.gocyclo]
min-complexity = 35

[linters.settings.varnamelen]
# Common math/grid variable names
ignore-names = [
  'a',
  'b',
  'x',
  'y',
  'z',
  'i',
  'j',
  'k',
  'n',
  'm',
  'h',
  'ok',
  'bc',
  'nx',
  'ny',
  'nz',
  'hx',
  'hy',
  'hz',
  'tt',
  'h2',
  'pi',
  'it',
  'w',
  'k1',
  'k2',
]
ignore-decls = ['T any']

[linters.exclusions]
generated = 'lax'
presets = ['comments', 'common-false-positives', 'legacy', 'std-error-handling']
paths = ['third_party$', 'builtin$', '^examples/']

[[linters.exclusions.rules]]
linters = ['mnd']
path = '.*\.go'

[[linters.exclusions.rules]]
linters = ['testpackage']
path = '.*_test\.go'

[[linters.exclusions.rules]]
linters = ['dupl']
path = '.*_test\.go'

[severity]
default = 'warn'

[[severity.rules]]
linters = ['exhaustive', 'exhaustruct', 'godox']
severity = 'info'

[formatters]
enable = ['gofumpt', 'goimports']

[formatters.exclusions]
generated = 'lax'
paths = ['third_party$', 'builtin$', '^examples/']
